<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Explorer | WORLD TRAVEL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🌍 WORLD TRAVEL</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="saved-countries.html" id="savedLink">Saved Places <span id="savedCount" class="saved-count">0</span></a></li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="api-container">
    <h2 class="page-title"><i class="fas fa-map-marked-alt"></i> Travel Explorer</h2>
    <p class="api-description">Discover countries and save your dream destinations!</p>

    <!-- SEARCH SECTION -->
    <div class="search-section">
      <div class="search-box">
        <input 
          type="text" 
          id="countryInput" 
          placeholder="Search for a country (e.g., Philippines, Japan, Italy)" 
          class="search-input"
        >
        <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Search</button>
      </div>
      <div class="filter-buttons">
        <button class="filter-btn" data-region="asia">🌏 Asia</button>
        <button class="filter-btn" data-region="africa">🌍 Africa</button>
        <button class="filter-btn" data-region="europe">🌍 Europe</button>
        <button class="filter-btn" data-region="americas">🌎 Americas</button>
        <button class="filter-btn" data-region="oceania">🌊 Oceania</button>
        <button class="filter-btn" id="resetBtn">🗺️ Show All</button>
      </div>
    </div>

    <!-- LOADING INDICATOR -->
    <div id="loading" class="loading-spinner" style="display: none;">
      <div class="spinner"></div>
      <p>Fetching travel destinations...</p>
    </div>

    <!-- ERROR MESSAGE -->
    <div id="errorMessage" class="error-message" style="display: none;"></div>

    <!-- RESULTS SECTION -->
    <div id="resultsContainer" class="results-grid">
      <!-- Country cards will be dynamically inserted here -->
    </div>

    <!-- NO RESULTS MESSAGE -->
    <div id="noResults" class="no-results" style="display: none;">
      <p><i class="fas fa-sad-tear"></i> No countries found. Try another search.</p>
    </div>
  </main>

  <footer>
    <p>© 2026 WORLD TRAVEL | Discover your next adventure</p>
  </footer>

  <script>
    // ========================
    // TRAVEL EXPLORER - SAVE DESTINATIONS
    // REST Countries API
    // ========================

    const API_BASE_URL = 'https://restcountries.com/v3.1';
    const STORAGE_KEY = 'WORLD_TRAVEL_SAVED_PLACES';

    // DOM Elements
    const countryInput = document.getElementById('countryInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const loadingSpinner = document.getElementById('loading');
    const errorMessage = document.getElementById('errorMessage');
    const noResults = document.getElementById('noResults');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const resetBtn = document.getElementById('resetBtn');
    const savedCountSpan = document.getElementById('savedCount');

    let currentData = [];

    // ========================
    // LOCALSTORAGE FUNCTIONS
    // ========================

    function getSavedPlaces() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [];
    }

    function savePlaces(places) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
      updateSavedCount();
    }

    function isPlaceSaved(countryName) {
      const saved = getSavedPlaces();
      return saved.some(c => c.name === countryName);
    }

    function savePlace(countryData) {
      const saved = getSavedPlaces();
      
      if (saved.some(c => c.name === countryData.name)) {
        showToast('⚠️ This destination is already saved!');
        return false;
      }

      saved.push(countryData);
      savePlaces(saved);
      showToast('✅ Destination saved to your bucket list!');
      return true;
    }

    function updateSavedCount() {
      const saved = getSavedPlaces();
      if (savedCountSpan) {
        savedCountSpan.textContent = saved.length;
      }
    }

    function showToast(message) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) {
        existingToast.remove();
      }

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    function setLoading(isLoading) {
      if (loadingSpinner) {
        loadingSpinner.style.display = isLoading ? 'block' : 'none';
      }
    }

    function showError(message) {
      if (errorMessage) {
        errorMessage.style.display = 'block';
        errorMessage.textContent = message;
      }
      if (resultsContainer) {
        resultsContainer.innerHTML = '';
      }
      if (noResults) {
        noResults.style.display = 'none';
      }
    }

    function hideError() {
      if (errorMessage) {
        errorMessage.style.display = 'none';
      }
    }

    function formatPopulation(population) {
      return population.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function formatArea(area) {
      return area.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function clearResults() {
      if (resultsContainer) {
        resultsContainer.innerHTML = '';
      }
    }

    function displayCountries(countries) {
      clearResults();
      hideError();

      if (!countries || countries.length === 0) {
        if (noResults) {
          noResults.style.display = 'block';
        }
        return;
      }

      if (noResults) {
        noResults.style.display = 'none';
      }

      countries.forEach(country => {
        const card = document.createElement('div');
        card.className = 'country-card';

        const name = country.name?.common || 'N/A';
        const officialName = country.name?.official || name;
        const capital = country.capital?.[0] || 'No capital';
        const region = country.region || 'N/A';
        const subregion = country.subregion || 'N/A';
        const population = country.population ? formatPopulation(country.population) : 'N/A';
        const area = country.area ? formatArea(country.area) : 'N/A';
        const flag = country.flags?.png || country.flags?.svg || 'https://via.placeholder.com/300x150?text=No+Flag';
        const currencies = country.currencies 
          ? Object.values(country.currencies).map(c => c.name).join(', ')
          : 'N/A';
        const languages = country.languages 
          ? Object.values(country.languages).join(', ')
          : 'N/A';

        const isSaved = isPlaceSaved(name);

        card.innerHTML = `
          <img src="${flag}" alt="Flag of ${name}" class="country-flag" onerror="this.src='https://via.placeholder.com/300x150?text=Flag+Not+Available'">
          <h3 class="country-name">${name}</h3>
          <p class="country-detail"><strong>Capital:</strong> ${capital}</p>
          <p class="country-detail"><strong>Region:</strong> ${region} (${subregion})</p>
          <p class="country-detail"><strong>Population:</strong> ${population}</p>
          <p class="country-detail"><strong>Languages:</strong> ${languages}</p>
          <button class="save-btn ${isSaved ? 'saved' : ''}" data-country='${JSON.stringify({
            name: name,
            officialName: officialName,
            capital: capital,
            region: region,
            subregion: subregion,
            population: population,
            area: area,
            flag: flag,
            currencies: currencies,
            languages: languages
          }).replace(/'/g, "&apos;")}'>
            ${isSaved ? '✓ Saved to Bucket List' : '✈️ Add to Bucket List'}
          </button>
        `;

        if (resultsContainer) {
          resultsContainer.appendChild(card);
        }
      });

      document.querySelectorAll('.save-btn:not(.saved)').forEach(btn => {
        btn.addEventListener('click', handleSaveClick);
      });
    }

    function handleSaveClick(e) {
      const btn = e.target;
      const countryData = JSON.parse(btn.dataset.country);

      if (savePlace(countryData)) {
        btn.textContent = '✓ Saved to Bucket List';
        btn.classList.add('saved');
        btn.removeEventListener('click', handleSaveClick);
      }
    }

    async function fetchAllCountries() {
      setLoading(true);
      hideError();
      
      try {
        const response = await fetch(`${API_BASE_URL}/all`);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        currentData = data;
        displayCountries(data);
        
      } catch (error) {
        console.error('Error fetching countries:', error);
        showError('Failed to fetch destinations. Please check your internet connection.');
      } finally {
        setLoading(false);
      }
    }

    async function searchCountry(name) {
      if (!name.trim()) {
        showError('Please enter a country name');
        return;
      }

      setLoading(true);
      hideError();
      
      try {
        const response = await fetch(`${API_BASE_URL}/name/${encodeURIComponent(name)}`);
        
        if (response.status === 404) {
          if (noResults) {
            noResults.style.display = 'block';
          }
          clearResults();
          return;
        }
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        currentData = data;
        displayCountries(data);
        
      } catch (error) {
        console.error('Error searching country:', error);
        showError('Failed to search for destination. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    async function filterByRegion(region) {
      setLoading(true);
      hideError();
      
      try {
        const response = await fetch(`${API_BASE_URL}/region/${region}`);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        currentData = data;
        displayCountries(data);
        
      } catch (error) {
        console.error('Error filtering by region:', error);
        showError('Failed to filter destinations by region.');
      } finally {
        setLoading(false);
      }
    }

    if (searchBtn) {
      searchBtn.addEventListener('click', () => {
        const searchTerm = countryInput.value.trim();
        if (searchTerm) {
          searchCountry(searchTerm);
          filterButtons.forEach(btn => btn.classList.remove('active'));
        }
      });
    }

    if (countryInput) {
      countryInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && searchBtn) {
          searchBtn.click();
        }
      });
    }

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const region = btn.dataset.region;
        
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (region) {
          filterByRegion(region);
          if (countryInput) {
            countryInput.value = '';
          }
        }
      });
    });

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        filterButtons.forEach(btn => btn.classList.remove('active'));
        if (countryInput) {
          countryInput.value = '';
        }
        fetchAllCountries();
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchAllCountries();
      updateSavedCount();
    });
  </script>
</body>
</html>
