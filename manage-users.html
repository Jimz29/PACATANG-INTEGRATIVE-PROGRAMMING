<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manage Users | NEONPULSE</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">NEONPULSE ADMIN</div>
    <ul class="nav-links">
      <li><a href="admin.html">Dashboard</a></li>
      <li><a href="index.html">Landing Page</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="login.html">Logout</a></li>
    </ul>
  </nav>

  <main class="settings-container">

    <h2 class="page-title">Manage Users</h2>

    <!-- USERS TABLE -->
    <table class="user-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTable">
        <!-- Empty initially; admin can add new users -->
      </tbody>
    </table>

    <!-- ADD USER FORM -->
    <div class="add-user-box">
      <h3>Add User</h3>
      <form id="addUserForm">
        <input type="text" id="newName" placeholder="Name" required>
        <input type="email" id="newEmail" placeholder="Email" required>
        <select id="newRole">
          <option>User</option>
          <option>Admin</option>
        </select>
        <button type="submit" class="add-btn">Add User</button>
      </form>
    </div>

  </main>

<script>
  // ================================
  // ROLE-BASED ACCESS
  // ================================
  const user = JSON.parse(localStorage.getItem("NEONPULSE_USER"));

  // Check if logged in
  if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
  }

  // Check role
  if (user.role.toLowerCase() !== "admin") {
    alert("Access denied. Admins only.");
    window.location.href = "index.html";
  }

  // ================================
  // USERS TABLE
  // ================================
  const table = document.getElementById("userTable");

  // Function to add a user to the table
  function addUserToTable(name, email, role) {
    const rowCount = table.rows.length + 1; // dynamic ID
    const row = table.insertRow();
    row.innerHTML = `
      <td>${rowCount}</td>
      <td>${name}</td>
      <td>${email}</td>
      <td>${role}</td>
      <td><button class="delete-btn" onclick="deleteUser(this)">Delete</button></td>
    `;
  }

  // Automatically add admin user to the table
  addUserToTable(user.name, user.email, user.role);

  // ================================
  // DELETE USER
  // ================================
  function deleteUser(btn) {
    if (confirm("Are you sure you want to delete this user?")) {
      btn.closest("tr").remove();
    }
  }

  // ================================
  // ADD USER FORM
  // ================================
  document.getElementById("addUserForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("newName").value;
    const email = document.getElementById("newEmail").value;
    const role = document.getElementById("newRole").value;

    addUserToTable(name, email, role);

    this.reset();
  });
</script>

</body>
</html>
