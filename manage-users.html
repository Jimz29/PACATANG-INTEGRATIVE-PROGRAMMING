<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manage Travelers | WORLD TRAVEL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🌍 WORLD TRAVEL ADMIN</div>
    <ul class="nav-links">
      <li><a href="admin.html">Dashboard</a></li>
      <li><a href="index.html">Home</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="login.html">Logout</a></li>
    </ul>
  </nav>

  <main class="settings-container">

    <h2 class="page-title"><i class="fas fa-users"></i> Manage Travelers</h2>

    <!-- USERS TABLE -->
    <table class="user-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Home Country</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTable">
        <!-- Dynamic content -->
      </tbody>
    </table>

    <!-- ADD TRAVELER FORM -->
    <div class="add-user-box">
      <h3><i class="fas fa-user-plus"></i> Add New Traveler</h3>
      <form id="addUserForm">
        <input type="text" id="newName" placeholder="Full Name" required>
        <input type="email" id="newEmail" placeholder="Email" required>
        <input type="text" id="newCountry" placeholder="Home Country" required>
        <select id="newRole">
          <option>Traveler</option>
          <option>Admin</option>
        </select>
        <button type="submit" class="add-btn"><i class="fas fa-plus"></i> Add Traveler</button>
      </form>
    </div>

  </main>

<script>
  // ================================
  // ROLE-BASED ACCESS
  // ================================
  const user = JSON.parse(localStorage.getItem("WORLD_TRAVEL_USER"));

  if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
  }

  if (user.role.toLowerCase() !== "admin") {
    alert("Access denied. Travel Admins only.");
    window.location.href = "index.html";
  }

  // ================================
  // USERS TABLE
  // ================================
  const table = document.getElementById("userTable");

  function addUserToTable(name, email, country, role) {
    const rowCount = table.rows.length + 1;
    const row = table.insertRow();
    row.innerHTML = `
      <td>${rowCount}</td>
      <td>${name}</td>
      <td>${email}</td>
      <td>${country || 'Not specified'}</td>
      <td>${role}</td>
      <td><button class="delete-btn" onclick="deleteUser(this)"><i class="fas fa-trash"></i> Remove</button></td>
    `;
  }

  // Load existing users from localStorage
  function loadAllUsers() {
    const users = JSON.parse(localStorage.getItem("WORLD_TRAVEL_USERS")) || [];
    users.forEach(u => {
      addUserToTable(u.name, u.email, u.country, u.role);
    });
  }

  loadAllUsers();

  function deleteUser(btn) {
    if (confirm("Remove this traveler from the community?")) {
      const row = btn.closest("tr");
      const email = row.cells[2].innerText;
      
      // Remove from localStorage
      let users = JSON.parse(localStorage.getItem("WORLD_TRAVEL_USERS")) || [];
      users = users.filter(u => u.email !== email);
      localStorage.setItem("WORLD_TRAVEL_USERS", JSON.stringify(users));
      
      row.remove();
    }
  }

  document.getElementById("addUserForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("newName").value;
    const email = document.getElementById("newEmail").value;
    const country = document.getElementById("newCountry").value;
    const role = document.getElementById("newRole").value;

    // Add to localStorage
    let users = JSON.parse(localStorage.getItem("WORLD_TRAVEL_USERS")) || [];
    const newUser = {
      name: name,
      email: email,
      country: country,
      password: "welcome123",
      role: role.toLowerCase()
    };
    
    if (!users.some(u => u.email === email)) {
      users.push(newUser);
      localStorage.setItem("WORLD_TRAVEL_USERS", JSON.stringify(users));
      addUserToTable(name, email, country, role);
    } else {
      alert("User with this email already exists!");
    }

    this.reset();
  });
</script>

</body>
</html>
