<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile | NEONPULSE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">NEONPULSE</div>
  <ul class="nav-links">
    <li><a href="settings.html">Settings</a></li>
    <li><a href="login.html" onclick="logout()">Logout</a></li>
  </ul>
</nav>

<main class="profile-container">
  <h2>User Profile</h2>
  <div class="profile-card">
    <div class="profile-header">
      <img src="default-avatar-profile-icon-social-media-user-image-gray-avatar-icon-blank-profile-silhouette-illustration-vector.jpg" alt="Profile Avatar">
      <div class="basic-info">
        <h3 id="userName">Name</h3>
        <p class="email" id="userEmail">email@example.com</p>
        <p class="phone" id="userPhone">+63 000 000 0000</p>
      </div>
    </div>

    <hr>

    <section class="profile-section">
      <h4>About Me</h4>
      <p>Welcome to your profile page!</p>
    </section>

    <!-- Back to Home Button -->
    <div style="text-align:center; margin-top:20px;">
      <button onclick="goHome()" style="
        padding:10px 20px;
        background: linear-gradient(90deg, #00ffe7, #ff00ff);
        color: #111;
        font-weight:bold;
        border:none;
        border-radius:8px;
        cursor:pointer;
      ">Back to Home</button>
    </div>

  </div>
</main>

<footer>
  <p>© 2026 NEONPULSE</p>
</footer>

<script>
  // Load user info from localStorage
  const user = JSON.parse(localStorage.getItem("NEONPULSE_USER"));
  if (user) {
    document.getElementById("userName").innerText = user.name;
    document.getElementById("userEmail").innerText = user.email;
    document.getElementById("userPhone").innerText = user.phone || "+63 000 000 0000";
  } else {
    alert("Please login first.");
    window.location.href = "login.html";
  }

  // Logout
  function logout() {
    window.location.href = "login.html";
  }

  // Back to Home
  function goHome() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
